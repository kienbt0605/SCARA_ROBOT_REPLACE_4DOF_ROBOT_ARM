<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Robot 4-DOF: Bigger 2D Circle & No Y-Slider</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a24; color: white; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; }
        #ui-panel { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 650px; background: rgba(30, 30, 40, 0.9); padding: 20px; border-radius: 12px; border: 1px solid #444; backdrop-filter: blur(10px); }
        .sliders-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .slider-group { display: flex; flex-direction: column; gap: 5px; }
        .slider-header { display: flex; justify-content: space-between; font-size: 13px; color: #aaa; }
        .paper-controls { grid-column: span 2; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; border: 1px dashed #666; margin-top: 5px;}
        .paper-row { display: flex; gap: 15px; align-items: center; margin-top: 8px; }
        .paper-row span { font-size: 13px; font-weight: bold; color: #f1c40f; width: 20px;}
        input[type=range] { width: 100%; cursor: pointer; accent-color: #3498db; }
        #btn-draw { width: 100%; padding: 12px; margin-top: 15px; background: #27ae60; border: none; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        #btn-draw.active { background: #e74c3c; }
        #status { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: #f1c40f; color: #000; padding: 8px 20px; border-radius: 5px; font-weight: bold; display: none; z-index: 10; }
        #hud { position: absolute; top: 20px; left: 20px; background: rgba(30,30,40,0.8); padding: 10px; border-radius: 5px; border: 1px solid #444; font-size: 12px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="status">ĐANG CHUẨN BỊ...</div>
    <div id="hud">
        Ngòi bút -> X: <span id="out-x">0.0</span> | Y: <span id="out-y">0.0</span> | Z: <span id="out-z">0.0</span>
    </div>

    <div id="ui-panel">
        <div class="sliders-grid">
            <div class="slider-group"><div class="slider-header"><span>Xoay Đế (J1)</span><span id="v-y">0°</span></div><input type="range" id="s-y" min="-180" max="180" value="0"></div>
            <div class="slider-group"><div class="slider-header"><span>Nâng Hạ (J2)</span><span id="v-b">0°</span></div><input type="range" id="s-b" min="-90" max="90" value="0"></div>
            <div class="slider-group"><div class="slider-header"><span>Khuỷu Tay (J3)</span><span id="v-s">0°</span></div><input type="range" id="s-s" min="0" max="150" value="0"></div>
            <div class="slider-group"><div class="slider-header"><span>Cổ Tay (J4)</span><span id="v-w">0°</span></div><input type="range" id="s-w" min="-150" max="150" value="0"></div>
            
            <div class="paper-controls">
                <div class="slider-header" style="color: #fff;"><b>Di Chuyển Bàn Vẽ (Giấy)</b></div>
                <div class="paper-row">
                    <span>X:</span><input type="range" id="p-x" min="-15" max="15" value="0" step="0.5">
                    <span>Z:</span><input type="range" id="p-z" min="10" max="30" value="18" step="0.5">
                </div>
            </div>
        </div>
        <button id="btn-draw">BẮT ĐẦU VẼ HÌNH TRÒN</button>
    </div>

    <div id="canvas-container"></div>

    <script>
        // --- 1. SETUP THẾ GIỚI 3D ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(-40, 30, 40);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 5, 12);
        controls.update();

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const light = new THREE.DirectionalLight(0xffffff, 0.8);
        light.position.set(10, 30, 20); light.castShadow = true; scene.add(light);
        scene.add(new THREE.GridHelper(60, 60, 0x333344, 0x222233));

        const paperGroup = new THREE.Group(); 
        scene.add(paperGroup);

        const paper = new THREE.Mesh(new THREE.PlaneGeometry(25, 25), new THREE.MeshStandardMaterial({ color: 0xffffff }));
        paper.rotation.x = -Math.PI / 2; 
        paper.receiveShadow = true;
        paperGroup.add(paper);
        
        paperGroup.position.set(0, 0.02, 18);

        const trailGeo = new THREE.BufferGeometry();
        const trailPos = new Float32Array(30000);
        trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPos, 3));
        const trail = new THREE.Line(trailGeo, new THREE.LineBasicMaterial({ color: 0xff0000 }));
        scene.add(trail);

        const matP = new THREE.MeshStandardMaterial({ color: 0xcccccc });
        const matJ = new THREE.MeshStandardMaterial({ color: 0x333333 });

        function createJoint() {
            const j = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.2, 3, 32), matJ);
            j.rotation.z = Math.PI / 2; return j;
        }

        const PED_H = 6.5; 
        const pedestal = new THREE.Mesh(new THREE.CylinderGeometry(5, 5.2, PED_H, 32), matP);
        pedestal.position.y = PED_H / 2; scene.add(pedestal);

        const robotRoot = new THREE.Group(); robotRoot.position.y = PED_H; scene.add(robotRoot);
        const baseYaw = new THREE.Group(); robotRoot.add(baseYaw);
        const basePitch = new THREE.Group(); basePitch.position.y = 1.0; baseYaw.add(basePitch); basePitch.add(createJoint());

        const L1 = 10;
        const arm1 = new THREE.Mesh(new THREE.BoxGeometry(1.8, L1, 1.8), matP); arm1.position.y = L1/2; basePitch.add(arm1);

        const shoulderPitch = new THREE.Group(); shoulderPitch.position.y = L1; basePitch.add(shoulderPitch); shoulderPitch.add(createJoint());

        const lShape = new THREE.Shape();
        lShape.moveTo(-1, 0); lShape.lineTo(1, 0); lShape.lineTo(1, 4); lShape.lineTo(2, 5);
        lShape.lineTo(10, 5); lShape.lineTo(10, 7); lShape.lineTo(1, 7);
        lShape.quadraticCurveTo(-1, 7, -1, 5); lShape.lineTo(-1, 0);
        const lMesh = new THREE.Mesh(new THREE.ExtrudeGeometry(lShape, {depth: 2, bevelEnabled: false}), matP);
        lMesh.geometry.translate(0,0,-1); lMesh.rotation.y = -Math.PI/2;
        shoulderPitch.add(lMesh);

        const wristPitch = new THREE.Group(); wristPitch.position.set(0, 6, 10);
        shoulderPitch.add(wristPitch); wristPitch.add(createJoint());

        const gripper = new THREE.Group(); 
        wristPitch.add(gripper);

        const holder = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 3), matJ);
        holder.position.z = 1.5; gripper.add(holder);

        // Bút vẽ - Mô hình chi tiết hơn
        const matPenBody = new THREE.MeshStandardMaterial({color: 0x333333, metalness: 0.8, roughness: 0.2}); // Đen kim loại
        const matPenTip = new THREE.MeshStandardMaterial({color: 0xeeeeee}); // Trắng/Bạc ngòi

        const PEN_BODY_LEN = 5.25;
        const penBody = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.22, PEN_BODY_LEN, 16), matPenBody);
        penBody.position.set(0, -2.375, 3);
        gripper.add(penBody);

        const penCap = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.28, 0.5, 16), matPenBody);
        penCap.position.set(0, 0.5, 3);
        gripper.add(penCap);

        const visualTip = new THREE.Mesh(new THREE.ConeGeometry(0.22, 0.5, 16), matPenTip);
        visualTip.position.set(0, -5.25, 3);
        visualTip.rotation.x = Math.PI; // Quay nón xuống
        gripper.add(visualTip);

        const tip = new THREE.Object3D(); 
        tip.position.set(0, -5.5, 3); 
        gripper.add(tip);

        // --- 3. LOGIC ĐIỀU KHIỂN & IK ---
        let state = "IDLE"; 
        let progress = 0, angle = 0, pCount = 0;
        let startWPos = new THREE.Vector3(), targetDrawPos = new THREE.Vector3();
        
        // SỬA BÁN KÍNH THÀNH 3
        const drawRadius = 3; 

        const btn = document.getElementById('btn-draw');
        const stTag = document.getElementById('status');

        btn.onclick = () => {
            if (state !== "IDLE") { location.reload(); return; }
            state = "APPROACH"; 
            tip.getWorldPosition(startWPos);
            
            const px = paperGroup.position.x;
            const pz = paperGroup.position.z;
            
            // Y cố định ở 0.17 (0.02 của giấy + 0.15 khoảng cách nét vẽ)
            targetDrawPos.set(px + Math.cos(0)*drawRadius, 0.17, pz + Math.sin(0)*drawRadius);
            
            btn.innerText = "RESET MÔ PHỎNG"; btn.classList.add('active');
            stTag.style.display = "block"; stTag.innerText = "ĐANG DI CHUYỂN BÚT...";
            
            document.getElementById('p-x').disabled = true;
            document.getElementById('p-z').disabled = true;
        };

        function solveIK(tPos) {
            const localT = baseYaw.parent.worldToLocal(tPos.clone());
            baseYaw.rotation.y = Math.atan2(localT.x, localT.z);

            const joints = [
                { j: basePitch, w: 0.8 }, 
                { j: shoulderPitch, w: 1.0 }
            ];

            const curTip = new THREE.Vector3();
            for(let i=0; i<40; i++) {
                for(let d of joints) {
                    tip.getWorldPosition(curTip);
                    const tL = d.j.parent.worldToLocal(tPos.clone());
                    const eL = d.j.parent.worldToLocal(curTip.clone());
                    const jL = d.j.position.clone();
                    const vEE = eL.sub(jL).setX(0).normalize();
                    const vT = tL.sub(jL).setX(0).normalize();
                    let a = vEE.angleTo(vT);
                    
                    if(!isNaN(a)) {
                        if(new THREE.Vector3().crossVectors(vEE, vT).x < 0) a = -a;
                        d.j.rotation.x += a * d.w;

                        if (d.j === shoulderPitch) {
                            const minGoc = THREE.MathUtils.degToRad(0); 
                            const maxGoc = THREE.MathUtils.degToRad(150); 
                            d.j.rotation.x = Math.max(minGoc, Math.min(maxGoc, d.j.rotation.x));
                        }
                    }
                }
            }
            wristPitch.rotation.x = - (basePitch.rotation.x + shoulderPitch.rotation.x);
            syncUI();
        }

        function syncUI() {
            document.getElementById('v-y').innerText = Math.round(THREE.MathUtils.radToDeg(-baseYaw.rotation.y))+'°';
            document.getElementById('v-b').innerText = Math.round(THREE.MathUtils.radToDeg(basePitch.rotation.x))+'°';
            document.getElementById('v-s').innerText = Math.round(THREE.MathUtils.radToDeg(shoulderPitch.rotation.x))+'°';
            document.getElementById('v-w').innerText = Math.round(THREE.MathUtils.radToDeg(wristPitch.rotation.x))+'°';
            document.getElementById('s-y').value = THREE.MathUtils.radToDeg(-baseYaw.rotation.y);
            document.getElementById('s-b').value = THREE.MathUtils.radToDeg(basePitch.rotation.x);
            document.getElementById('s-s').value = THREE.MathUtils.radToDeg(shoulderPitch.rotation.x);
            document.getElementById('s-w').value = THREE.MathUtils.radToDeg(wristPitch.rotation.x);
            const p = new THREE.Vector3(); tip.getWorldPosition(p);
            document.getElementById('out-x').innerText = p.x.toFixed(1);
            document.getElementById('out-y').innerText = p.y.toFixed(1);
            document.getElementById('out-z').innerText = p.z.toFixed(1);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (state === "APPROACH") {
                progress += 0.005; 
                if (progress >= 1) { progress = 1; state = "DRAWING"; stTag.innerText = "ĐANG VẼ CHUẨN XÁC..."; stTag.style.background = "#2ecc71"; }
                const curTarget = new THREE.Vector3().lerpVectors(startWPos, targetDrawPos, progress);
                solveIK(curTarget);
            }
            if (state === "DRAWING") {
                angle += 0.006; 
                const px = paperGroup.position.x;
                const pz = paperGroup.position.z;

                const target = new THREE.Vector3(
                    px + Math.cos(angle)*drawRadius, 
                    0.17, 
                    pz + Math.sin(angle)*drawRadius
                );
                
                solveIK(target);
                
                if (pCount < 20000 && angle <= Math.PI * 2 + 0.05) {
                    const p = new THREE.Vector3(); tip.getWorldPosition(p);
                    trailPos[pCount*3] = p.x; trailPos[pCount*3+1] = p.y; trailPos[pCount*3+2] = p.z;
                    pCount++; trailGeo.setDrawRange(0, pCount); trailGeo.attributes.position.needsUpdate = true;
                } else if (angle > Math.PI * 2) { 
                    stTag.innerText = "HOÀN THÀNH VỚI QUỸ ĐẠO 2D LỚN!"; 
                    stTag.style.background = "#3498db"; 
                }
            }
            renderer.render(scene, camera);
        }

        const bindJoint = (id, obj, prop, inv=1) => {
            document.getElementById(id).oninput = (e) => {
                if(state !== "IDLE") return;
                obj[prop] = THREE.MathUtils.degToRad(e.target.value * inv);
                syncUI();
            };
        };
        bindJoint('s-y', baseYaw.rotation, 'y', -1); bindJoint('s-b', basePitch.rotation, 'x');
        bindJoint('s-s', shoulderPitch.rotation, 'x'); bindJoint('s-w', wristPitch.rotation, 'x');

        function clearTrail() {
            pCount = 0;
            trailGeo.setDrawRange(0, 0);
            trailGeo.attributes.position.needsUpdate = true;
        }

        document.getElementById('p-x').oninput = (e) => { paperGroup.position.x = parseFloat(e.target.value); clearTrail(); };
        document.getElementById('p-z').oninput = (e) => { paperGroup.position.z = parseFloat(e.target.value); clearTrail(); };

        animate();
    </script>
</body>
</html>
